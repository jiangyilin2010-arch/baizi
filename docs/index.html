<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白子*恐怖：夜巡与速写</title>
  <style>
    :root {
      --bg-1: #07161f;
      --bg-2: #132f3d;
      --panel: rgba(7, 20, 28, 0.86);
      --line: rgba(143, 210, 223, 0.28);
      --text: #edf7fb;
      --muted: #a8bfca;
      --accent: #8de6ea;
      --accent-strong: #cbfbff;
      --reply: #ffd0d0;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Hiragino Sans GB", "PingFang SC", "Noto Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(67, 166, 185, 0.22), transparent 34%),
        radial-gradient(circle at 15% 20%, rgba(112, 200, 208, 0.12), transparent 28%),
        linear-gradient(140deg, var(--bg-1), var(--bg-2) 52%, #060a0e);
      overflow-x: hidden;
    }

    body.modal-open {
      overflow: hidden;
    }

    body[data-theme="light"] {
      --bg-1: #dceff5;
      --bg-2: #c6e6ef;
      --panel: rgba(238, 250, 255, 0.88);
      --line: rgba(60, 147, 170, 0.28);
      --text: #103341;
      --muted: #4d6e7c;
      --accent: #53b5c8;
      --accent-strong: #1f7f95;
      --reply: #b86c86;
      --shadow: 0 24px 80px rgba(15, 68, 87, 0.2);
    }

    body[data-theme="pink"] {
      --bg-1: #ffe7f1;
      --bg-2: #ffd6ec;
      --panel: rgba(255, 240, 248, 0.9);
      --line: rgba(187, 117, 162, 0.34);
      --text: #51263f;
      --muted: #8a5a78;
      --accent: #f29ac4;
      --accent-strong: #cf5f9b;
      --reply: #8f436f;
      --shadow: 0 24px 80px rgba(134, 63, 106, 0.22);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.95), transparent 85%);
      z-index: 0;
    }

    body[data-theme="light"]::before,
    body[data-theme="pink"]::before {
      background:
        linear-gradient(rgba(34, 80, 96, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 80, 96, 0.05) 1px, transparent 1px);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(1220px, calc(100% - 28px));
      margin: 14px auto 22px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(3, 10, 15, 0.55);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 8px 14px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.24em;
      color: var(--muted);
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.1;
    }

    .subhead {
      margin: 8px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .stats {
      min-width: 220px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: rgba(8, 20, 28, 0.58);
    }

    .stats p {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .affection-row {
      border: 1px solid rgba(141, 230, 234, 0.18);
      border-radius: 12px;
      padding: 9px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .affection-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .affection-level {
      font-size: 13px;
      color: var(--accent-strong);
      font-weight: 600;
    }

    .affection-points {
      font-size: 12px;
      color: var(--muted);
    }

    .affection-note {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .meter {
      margin-bottom: 9px;
    }

    .meter:last-child {
      margin-bottom: 0;
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .meter-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(141, 230, 234, 0.22), var(--accent));
      transition: width 0.28s ease;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 39%) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .visual {
      position: sticky;
      top: 10px;
      min-height: 760px;
      border: 1px solid var(--line);
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(circle at 62% 14%, rgba(141, 230, 234, 0.2), transparent 23%),
        radial-gradient(circle at 22% 72%, rgba(141, 230, 234, 0.12), transparent 24%),
        linear-gradient(180deg, rgba(11, 23, 31, 0.92), rgba(4, 10, 16, 0.98));
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 14px 14px 12px;
    }

    .halo {
      width: 120px;
      height: 120px;
      margin-left: auto;
      border-radius: 50%;
      border: 2px solid rgba(141, 230, 234, 0.45);
      box-shadow:
        0 0 0 12px rgba(141, 230, 234, 0.08),
        0 0 58px rgba(141, 230, 234, 0.18);
      flex-shrink: 0;
      animation: haloShift 4.8s ease-in-out infinite;
    }

    @keyframes haloShift {
      0%, 100% { transform: scale(0.98); opacity: 0.84; }
      50% { transform: scale(1.03); opacity: 1; }
    }

    .portrait-wrap {
      position: relative;
      height: 560px;
      margin-top: 4px;
    }

    .portrait {
      position: absolute;
      top: 10px;
      left: 50%;
      width: min(100%, 470px);
      max-height: 540px;
      object-fit: contain;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.45));
      opacity: 0;
      transform: translateX(-50%) translateY(16px) scale(0.98);
      transition: opacity 0.36s ease, transform 0.36s ease;
      pointer-events: none;
      user-select: none;
    }

    .portrait.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .portrait.active.effect-recoil-burst {
      animation: portraitRecoilBurst var(--recoil-duration, 110ms) linear 1;
      will-change: transform;
    }

    .portrait.active.effect-happy {
      animation: portraitHappyDrop 0.24s cubic-bezier(0.23, 0.85, 0.31, 1) 1;
      will-change: transform;
    }

    @keyframes portraitRecoilBurst {
      0% { transform: translateX(calc(-50% + var(--recoil-x1, -4px))) translateY(0) scale(1); }
      30% { transform: translateX(calc(-50% + var(--recoil-x2, 6px))) translateY(0) scale(1); }
      60% { transform: translateX(calc(-50% + var(--recoil-x3, -3px))) translateY(0) scale(1); }
      100% { transform: translateX(-50%) translateY(0) scale(1); }
    }

    @keyframes portraitHappyDrop {
      0% { transform: translateX(-50%) translateY(0) scale(1); }
      40% { transform: translateX(-50%) translateY(14px) scale(1); }
      100% { transform: translateX(-50%) translateY(0) scale(1); }
    }

    .visual-caption {
      margin-top: auto;
      border: 1px solid rgba(141, 230, 234, 0.16);
      border-radius: 14px;
      background: rgba(4, 12, 18, 0.62);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .panel {
      min-height: 760px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(10, 21, 30, 0.9), rgba(5, 13, 19, 0.95));
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .scene-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .scene-tag,
    .scene-count {
      font-size: 12px;
      color: var(--muted);
      padding: 7px 11px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      letter-spacing: 0.08em;
    }

    .speaker {
      margin: 2px 0 0;
      color: var(--accent-strong);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .scene-title {
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.16;
    }

    .dialogue {
      flex: 1;
      min-height: 410px;
      max-height: 470px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.02);
      padding: 12px;
      display: grid;
      align-content: start;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .dialogue::-webkit-scrollbar {
      width: 8px;
    }

    .dialogue::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: rgba(141, 230, 234, 0.32);
    }

    .scene-block {
      border: 1px solid rgba(141, 230, 234, 0.16);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .block-head {
      margin: 0 0 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    .line {
      margin: 0 0 8px;
      padding: 10px 12px;
      border-left: 2px solid rgba(141, 230, 234, 0.36);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      line-height: 1.72;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .line:last-child {
      margin-bottom: 0;
    }

    .line.reply {
      border-left-color: rgba(255, 176, 176, 0.55);
      background: rgba(255, 176, 176, 0.08);
      color: #ffe9e9;
    }

    .choices {
      display: grid;
      gap: 10px;
    }

    .choice,
    .action {
      width: 100%;
      border: 1px solid rgba(141, 230, 234, 0.22);
      border-radius: 14px;
      background:
        linear-gradient(120deg, rgba(141, 230, 234, 0.1), rgba(141, 230, 234, 0.03)),
        rgba(255, 255, 255, 0.02);
      color: var(--text);
      padding: 12px 14px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    .choice:hover,
    .action:hover {
      transform: translateY(-1px);
      border-color: rgba(141, 230, 234, 0.42);
    }

    .choice strong,
    .action strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent-strong);
      font-size: 15px;
    }

    .choice span,
    .action span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .choice.selected {
      border-color: rgba(141, 230, 234, 0.58);
      background:
        linear-gradient(120deg, rgba(141, 230, 234, 0.2), rgba(141, 230, 234, 0.06)),
        rgba(255, 255, 255, 0.03);
    }

    .choice:disabled {
      opacity: 0.72;
      cursor: default;
    }

    .footer {
      margin-top: 2px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }

    .hint {
      font-size: 12px;
      line-height: 1.62;
      color: var(--muted);
    }

    .hint kbd {
      border: 1px solid rgba(141, 230, 234, 0.35);
      border-bottom-width: 2px;
      border-radius: 6px;
      padding: 1px 5px;
      font-size: 11px;
      color: var(--accent-strong);
      background: rgba(8, 20, 28, 0.7);
      font-family: "SFMono-Regular", ui-monospace, Menlo, monospace;
    }

    .action {
      max-width: 220px;
      text-align: center;
    }

    .action[disabled] {
      opacity: 0.48;
      transform: none;
      cursor: not-allowed;
    }

    .ending-card {
      border: 1px solid rgba(141, 230, 234, 0.24);
      border-radius: 16px;
      padding: 12px;
      background:
        radial-gradient(circle at top right, rgba(141, 230, 234, 0.12), transparent 28%),
        rgba(255, 255, 255, 0.02);
    }

    .ending-card h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .ending-card p {
      margin: 0 0 8px;
      line-height: 1.72;
      color: var(--muted);
      font-size: 15px;
    }

    .ending-card .quote {
      color: var(--accent-strong);
    }

    .ending-image {
      width: min(100%, 420px);
      border-radius: 12px;
      border: 1px solid rgba(141, 230, 234, 0.2);
      margin: 8px 0 10px;
      display: block;
    }

    .credit {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .archive-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      border: 1px solid rgba(141, 230, 234, 0.36);
      border-radius: 999px;
      background: rgba(7, 20, 28, 0.88);
      color: var(--accent-strong);
      font: inherit;
      font-size: 13px;
      padding: 8px 12px;
      cursor: pointer;
      z-index: 3;
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    .archive-toggle:hover {
      transform: translateY(-1px);
      border-color: rgba(141, 230, 234, 0.62);
    }

    .archive-overlay[hidden] {
      display: none;
    }

    .archive-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(3, 9, 14, 0.72);
      backdrop-filter: blur(4px);
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .archive-panel {
      width: min(960px, 100%);
      max-height: min(88vh, 860px);
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(8, 20, 28, 0.96), rgba(4, 11, 16, 0.98));
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .archive-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 10px;
    }

    .archive-head h3 {
      margin: 0;
      font-size: 22px;
    }

    .archive-close {
      border: 1px solid rgba(141, 230, 234, 0.32);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font: inherit;
      padding: 6px 12px;
      cursor: pointer;
    }

    .archive-sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .collection {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .collection h4 {
      margin: 0 0 10px;
      font-size: 16px;
      color: var(--accent-strong);
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }

    .theme-option {
      border-radius: 12px;
      border: 1px solid rgba(141, 230, 234, 0.22);
      background: rgba(255, 255, 255, 0.02);
      color: var(--text);
      font: inherit;
      padding: 10px;
      text-align: left;
      cursor: pointer;
    }

    .theme-option strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: var(--accent-strong);
    }

    .theme-option span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .theme-option.active {
      border-color: rgba(141, 230, 234, 0.56);
      background:
        radial-gradient(circle at top right, rgba(141, 230, 234, 0.12), transparent 35%),
        rgba(255, 255, 255, 0.05);
    }

    .theme-option[disabled] {
      opacity: 0.56;
      cursor: not-allowed;
    }

    .collect-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
    }

    .collect-card {
      border-radius: 12px;
      border: 1px solid rgba(141, 230, 234, 0.18);
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .collect-card h5 {
      margin: 0 0 6px;
      font-size: 14px;
    }

    .collect-card p {
      margin: 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .collect-card .state {
      margin-top: 6px;
      font-size: 12px;
    }

    .collect-card.unlocked {
      border-color: rgba(141, 230, 234, 0.52);
      background:
        radial-gradient(circle at top right, rgba(141, 230, 234, 0.12), transparent 40%),
        rgba(255, 255, 255, 0.05);
    }

    .collect-card.unlocked .state {
      color: var(--accent-strong);
    }

    .collect-card.locked {
      opacity: 0.62;
      filter: grayscale(0.22);
    }

    .achievement-toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(24px);
      border: 1px solid rgba(141, 230, 234, 0.5);
      border-radius: 12px;
      background: rgba(7, 20, 28, 0.96);
      color: var(--accent-strong);
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }

    .achievement-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    body[data-theme="light"] .shell,
    body[data-theme="pink"] .shell {
      background: rgba(255, 255, 255, 0.58);
    }

    body[data-theme="light"] .stats,
    body[data-theme="light"] .panel,
    body[data-theme="light"] .visual,
    body[data-theme="light"] .dialogue,
    body[data-theme="light"] .scene-tag,
    body[data-theme="light"] .scene-count,
    body[data-theme="light"] .archive-panel,
    body[data-theme="light"] .archive-toggle,
    body[data-theme="light"] .ending-card {
      background: rgba(255, 255, 255, 0.74);
      color: var(--text);
    }

    body[data-theme="light"] .hint {
      color: #335666;
    }

    body[data-theme="light"] .hint kbd {
      background: rgba(255, 255, 255, 0.95);
      color: #1f7f95;
      border-color: rgba(49, 133, 152, 0.46);
    }

    body[data-theme="light"] .achievement-toast {
      background: rgba(255, 255, 255, 0.96);
      color: #1f7f95;
      border-color: rgba(49, 133, 152, 0.5);
      box-shadow: 0 12px 32px rgba(41, 102, 120, 0.24);
    }

    body[data-theme="pink"] .stats,
    body[data-theme="pink"] .panel,
    body[data-theme="pink"] .visual,
    body[data-theme="pink"] .dialogue,
    body[data-theme="pink"] .scene-tag,
    body[data-theme="pink"] .scene-count,
    body[data-theme="pink"] .archive-panel,
    body[data-theme="pink"] .archive-toggle,
    body[data-theme="pink"] .ending-card {
      background: rgba(255, 248, 252, 0.78);
      color: var(--text);
    }

    body[data-theme="pink"] .hint {
      color: #7d4a69;
    }

    body[data-theme="pink"] .hint kbd {
      background: rgba(255, 255, 255, 0.95);
      color: #b24f87;
      border-color: rgba(178, 79, 135, 0.46);
    }

    body[data-theme="pink"] .achievement-toast {
      background: rgba(255, 247, 252, 0.96);
      color: #b24f87;
      border-color: rgba(178, 79, 135, 0.5);
      box-shadow: 0 12px 32px rgba(152, 84, 121, 0.24);
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .visual {
        position: static;
        min-height: 520px;
      }

      .portrait-wrap {
        height: 390px;
      }

      .portrait {
        max-height: 375px;
      }

      .panel {
        min-height: 640px;
      }

      .dialogue {
        max-height: 380px;
      }

      .archive-toggle {
        top: 12px;
        right: 12px;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 12px, 100%);
        margin-top: 6px;
        padding: 10px;
      }

      .header,
      .footer {
        flex-direction: column;
        align-items: stretch;
      }

      .stats,
      .action {
        max-width: none;

        const currentToken = recoilLoopToken;

          if (currentToken !== recoilLoopToken) return;
          const burstDuration = Math.round(75 + Math.random() * 85);
          const jitter1 = `${Math.round(-7 + Math.random() * 5)}px`;
          const jitter2 = `${Math.round(4 + Math.random() * 7)}px`;

          activePortrait.style.setProperty("--recoil-duration", `${burstDuration}ms`);
          activePortrait.style.setProperty("--recoil-x1", jitter1);
          activePortrait.style.setProperty("--recoil-x2", jitter2);
          activePortrait.style.setProperty("--recoil-x3", jitter3);
          activePortrait.classList.remove("effect-recoil-burst");
          void activePortrait.offsetWidth;
          activePortrait.classList.add("effect-recoil-burst");

          const nextDelay = Math.round(120 + Math.random() * 420);
          recoilTimer = setTimeout(runBurst, burstDuration + nextDelay);
        };

        recoilTimer = setTimeout(runBurst, Math.round(60 + Math.random() * 120));
        return;

      if (effectType === "happyDrop") {
        activePortrait.classList.add("effect-happy");

    function totalPointsForLevel(level) {
      return 5 * level * level + 25 * level;
    }

    function levelUpCost(level) {
      return 10 * level + 30;
    }

    function getAffectionCap() {
      return totalPointsForLevel(MAX_AFFECTION_LEVEL);
    }

    function clampAffectionPoints(points) {
      const normalized = Number.isFinite(points) ? Math.floor(points) : 0;
      return Math.max(0, Math.min(getAffectionCap(), normalized));
    }

    function getAffectionStatus(points = progress.affectionPoints) {
      const safePoints = clampAffectionPoints(points);
      let level = 0;
      let spent = 0;
      while (level < MAX_AFFECTION_LEVEL) {
        const need = levelUpCost(level);
        if (safePoints - spent < need) break;
        spent += need;
        level += 1;
      }

      if (level >= MAX_AFFECTION_LEVEL) {
        return {
          level: MAX_AFFECTION_LEVEL,
          current: 0,
          need: 0,
          progress: 100
        };
      }

      const current = safePoints - spent;
      const need = levelUpCost(level);
      const progress = Math.max(0, Math.min(100, Math.round((current / need) * 100)));
      return { level, current, need, progress };
    }

    function isThemeUnlocked(themeKey, level = getAffectionStatus().level) {
      const requiredLevel = THEME_REQUIREMENTS[themeKey] ?? 0;
      return level >= requiredLevel;
    }

    function applyTheme(themeKey) {
      const safeTheme = THEME_REQUIREMENTS[themeKey] !== undefined ? themeKey : "default";
      const status = getAffectionStatus();
      const finalTheme = isThemeUnlocked(safeTheme, status.level) ? safeTheme : "default";
      progress.selectedTheme = finalTheme;
      document.body.setAttribute("data-theme", finalTheme);

      } catch (_error) {
        progress.playCount = 0;
        progress.affectionPoints = 0;
        progress.maxTrust = 0;
        progress.maxCalm = 0;
        progress.selectedTheme = "default";
        progress.unlockedEndings = new Set();
        progress.unlockedAchievements = new Set();
      }
    }

    function saveProgress() {
      const payload = {
        playCount: progress.playCount,
        affectionPoints: progress.affectionPoints,
        maxTrust: progress.maxTrust,
        maxCalm: progress.maxCalm,
        selectedTheme: progress.selectedTheme,
        unlockedEndings: [...progress.unlockedEndings],
        unlockedAchievements: [...progress.unlockedAchievements]
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function updateProgressStats() {
      progress.maxTrust = Math.max(progress.maxTrust, state.trust);
      progress.maxCalm = Math.max(progress.maxCalm, state.calm);
    }

    function unlockAchievement(achievementId, newlyUnlocked) {
      if (!achievements[achievementId]) return;
      if (progress.unlockedAchievements.has(achievementId)) return;
      progress.unlockedAchievements.add(achievementId);
      newlyUnlocked.push(achievementId);
    }

    function evaluateAchievements() {
      const newlyUnlocked = [];
      const totalEndings = Object.keys(endings).length;
      if (progress.playCount >= 1) unlockAchievement("firstRun", newlyUnlocked);
      if (progress.maxTrust >= 10) unlockAchievement("trust10", newlyUnlocked);
      if (progress.maxCalm >= 10) unlockAchievement("calm10", newlyUnlocked);
      if (progress.playCount >= 3) unlockAchievement("play3", newlyUnlocked);
      if (progress.playCount >= 10) unlockAchievement("play10", newlyUnlocked);
      if (progress.unlockedEndings.has("parallel")) unlockAchievement("endingParallel", newlyUnlocked);
      if (progress.unlockedEndings.has("framedPainting")) unlockAchievement("endingFramedPainting", newlyUnlocked);
      if (progress.unlockedEndings.has("b68Ceasefire")) unlockAchievement("endingB68Ceasefire", newlyUnlocked);
      if (progress.unlockedEndings.has("gameDevSync")) unlockAchievement("endingGameDevSync", newlyUnlocked);
      if (progress.unlockedEndings.size >= 5) unlockAchievement("endingCollector5", newlyUnlocked);
      if (progress.unlockedEndings.size >= totalEndings) unlockAchievement("endingCollectorAll", newlyUnlocked);
      if (progress.playCount >= 100) unlockAchievement("play100", newlyUnlocked);
      return newlyUnlocked;
    }

    function showAchievementToast(message) {
      if (!achievementToast) return;
      achievementToast.textContent = message;
      achievementToast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        achievementToast.classList.remove("visible");
        setTimeout(() => {
          toastActive = false;
          showNextAchievementToast();
        }, 180);
      }, 3000);
    }

    function showNextAchievementToast() {
      if (toastActive) return;
      const nextId = toastQueue.shift();
      if (!nextId) return;
      toastActive = true;
      const achievement = achievements[nextId];
      if (!achievement) {
        toastActive = false;
        showNextAchievementToast();
        return;
      }
      const achievementName = achievement.title.replace("成就：", "");
      showAchievementToast(`你打成了「${achievementName}」成就`);
    }

    function enqueueAchievementToasts(newlyUnlocked) {
      if (!Array.isArray(newlyUnlocked) || newlyUnlocked.length === 0) return;
      newlyUnlocked.forEach((achievementId) => {
        toastQueue.push(achievementId);
      });
      showNextAchievementToast();
    }

    function syncProgress(newlyUnlocked = [], shouldToast = true) {
      applyTheme(progress.selectedTheme);
      refreshAffectionUI();
      saveProgress();
      renderArchivePanel();
      if (shouldToast) enqueueAchievementToasts(newlyUnlocked);
    }

    function renderThemeSwitcher() {
      const status = getAffectionStatus();
      const themes = [
        { key: "default", title: "夜巡主题", detail: "默认深色背景（已解锁）" },
        { key: "light", title: "亮色主题", detail: "白子配色亮色背景（Lv.5解锁）" },
        { key: "pink", title: "粉色主题", detail: "粉色背景主题（Lv.10解锁）" }
      ];

      themeSwitcher.innerHTML = themes
        .map((theme) => {
          const unlocked = isThemeUnlocked(theme.key, status.level);
          const isActive = progress.selectedTheme === theme.key;
          return `
            <button type="button" class="theme-option ${isActive ? "active" : ""}" data-theme="${theme.key}" ${unlocked ? "" : "disabled"}>
              <strong>${theme.title}</strong>
              <span>${theme.detail}</span>
            </button>
          `;
        })
        .join("");
    }

    function renderArchivePanel() {
      playCountNode.textContent = String(progress.playCount);
      endingCollection.innerHTML = Object.entries(endings)
        .map(([endingId, ending]) => {
          const unlocked = progress.unlockedEndings.has(endingId);
          return `
            <article class="collect-card ${unlocked ? "unlocked" : "locked"}">
              <h5>${ending.title}</h5>
              <p>路线：${ending.route}</p>
              <p class="state">${unlocked ? "已达成" : "未达成"}</p>
            </article>
          `;
        })
        .join("");

      achievementCollection.innerHTML = Object.entries(achievements)
        .map(([achievementId, achievement]) => {
          const unlocked = progress.unlockedAchievements.has(achievementId);
          return `
            <article class="collect-card ${unlocked ? "unlocked" : "locked"}">
              <h5>${achievement.title}</h5>
              <p>${achievement.detail}</p>
              <p class="state">${unlocked ? "已解锁" : "未解锁"}</p>
            </article>
          `;
        })
        .join("");

      renderThemeSwitcher();
    }

    function openArchivePanel() {
      renderArchivePanel();
      archiveOverlay.hidden = false;
      document.body.classList.add("modal-open");
    }

    function closeArchivePanel() {
      archiveOverlay.hidden = true;
      document.body.classList.remove("modal-open");
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function charDelay(char) {
      if ("，。！？；：".includes(char)) return 70;
      if (char === " ") return 15;
      return 30;
    }

    function scrollToBottom() {
      dialogueLog.scrollTop = dialogueLog.scrollHeight;
    }

    async function typeText(target, text, token) {
      if (state.skipSegment) {
        target.textContent = text;
        return;
      }
      for (let i = 0; i < text.length; i += 1) {
        if (token !== state.typeToken) return;
        if (state.skipSegment) {
          target.textContent = text;
          break;
        }
        target.textContent += text[i];
        scrollToBottom();
        await sleep(charDelay(text[i]));
      }
      scrollToBottom();
    }

    function createSceneBlock(scene) {
      dialogueLog.innerHTML = "";
      const block = document.createElement("article");
      block.className = "scene-block";

      const head = document.createElement("p");
      head.className = "block-head";
      head.innerHTML = `<span>${scene.tag} · ${scene.title}</span><span>${scene.route}</span>`;
      block.appendChild(head);

      const linesWrap = document.createElement("div");
      block.appendChild(linesWrap);
      dialogueLog.appendChild(block);
      state.sceneLinesWrap = linesWrap;
      state.replyNode = null;
    }

    function renderChoices(scene) {
      choices.innerHTML = "";
      scene.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.innerHTML = `<strong>${choice.label}</strong><span>${choice.detail}</span>`;
        button.addEventListener("click", () => selectChoice(index));
        choices.appendChild(button);
      });
      hint.innerHTML = "可反复切换选项，点击继续时才会锁定并进入下一幕。";
    }

    async function renderScene(sceneId) {
      const scene = sceneMap[sceneId];
      state.currentSceneId = sceneId;
      state.selectedChoice = null;
      state.finished = false;
      state.skipSegment = false;
      state.typing = true;
      ++state.typeToken;
      const token = state.typeToken;

      sceneTag.textContent = scene.tag;
      sceneCount.textContent = `第 ${state.step + 1} 幕`;
      speaker.textContent = scene.speaker;
      sceneTitle.textContent = scene.title;
      moodLabel.textContent = `状态：${scene.mood}`;
      routeLabel.textContent = `路线：${scene.route}`;
      setPortrait(scene.portrait);
      applyPortraitEffect(scene.portraitEffect);

      choices.innerHTML = "";
      nextButton.disabled = true;
      nextButton.innerHTML = "<strong>继续</strong><span>先选择回应</span>";
      hint.innerHTML = '打字机播放中可按 <kbd>空格</kbd> 显示当前段落全文。';

      createSceneBlock(scene);
      for (const lineText of scene.lines) {
        if (token !== state.typeToken) return;
        const p = document.createElement("p");
        p.className = "line";
        state.sceneLinesWrap.appendChild(p);
        await typeText(p, lineText, token);
      }

      if (token !== state.typeToken) return;
      state.typing = false;
      state.skipSegment = false;
      renderChoices(scene);
    }

    async function previewReply(replyText) {
      if (!state.sceneLinesWrap) return;
      if (!state.replyNode) {
        state.replyNode = document.createElement("p");
        state.replyNode.className = "line reply";
        state.sceneLinesWrap.appendChild(state.replyNode);
      }
      state.replyNode.textContent = "";
      state.skipSegment = false;
      state.typing = true;
      ++state.typeToken;
      const token = state.typeToken;
      await typeText(state.replyNode, replyText, token);
      if (token !== state.typeToken) return;
      state.typing = false;
      state.skipSegment = false;
    }

    async function selectChoice(choiceIndex) {
      if (state.finished) return;
      if (state.typing) {
        if (!state.replyNode) return;
        ++state.typeToken;
        state.typing = false;
        state.skipSegment = false;
      }
      const scene = sceneMap[state.currentSceneId];
      const choice = scene.choices[choiceIndex];
      state.selectedChoice = choiceIndex;

      [...choices.children].forEach((button, index) => {
        button.classList.toggle("selected", index === choiceIndex);
      });

      nextButton.disabled = true;
      hint.innerHTML = `预览回应：信赖 +${choice.effects.trust} / 安定 +${choice.effects.calm}（继续后生效）`;
      await previewReply(choice.reply);
      nextButton.disabled = false;
      nextButton.innerHTML = "<strong>继续</strong><span>锁定当前选项并推进</span>";
    }

    function registerEndingAndAchievements(endingId) {
      progress.unlockedEndings.add(endingId);
      progress.playCount += 1;
      addAffectionPoints(5);
      updateProgressStats();
      const newlyUnlocked = evaluateAchievements();
      syncProgress(newlyUnlocked, true);
    }

    function resolveEnding(finalChoice) {
      if (state.unlocks.has("framedPainting")) return "framedPainting";
      if (state.unlocks.has("b68Ceasefire")) return "b68Ceasefire";
      if (state.unlocks.has("gameDevSync")) return "gameDevSync";
      if (state.unlocks.has("trinitySync")) return "trinitySync";
      if (state.unlocks.has("engineeringLight")) return "engineeringLight";
      if (state.unlocks.has("bankRehearsal") && finalChoice.endingHint === "parallel") return "bankRehearsal";
      if (state.unlocks.has("ramenSphere")) return "ramenSphere";
      if (state.unlocks.has("officeSnacks") && finalChoice.endingHint === "guard") return "officeSnacks";
      if (state.unlocks.has("lanternPatrol") && finalChoice.endingHint === "beacon") return "lanternPatrol";

      if (finalChoice.endingHint === "parallel") return "parallel";
      if (finalChoice.endingHint === "guard") return "guard";
      return "beacon";
    }

    function renderEnding(endingId) {
      const ending = endings[endingId];
      if (!ending) return;
      registerEndingAndAchievements(endingId);
      state.finished = true;
      state.typing = false;
      state.skipSegment = false;
      ++state.typeToken;

      sceneTag.textContent = "结局";
      sceneCount.textContent = "已完成";
      speaker.textContent = "记录完成";
      sceneTitle.textContent = ending.title;
      moodLabel.textContent = `状态：${ending.mood}`;
      routeLabel.textContent = `路线：${ending.route}`;
      setPortrait(ending.portrait);
      applyPortraitEffect(ending.portraitEffect);

      dialogueLog.innerHTML = `
        <article class="scene-block">
          <div class="ending-card">
            <h3>${ending.title}</h3>
            ${ending.illustration ? `<img class="ending-image" src="${ending.illustration}" alt="${ending.title}插图">` : ""}
            ${ending.lines.map((line) => `<p>${line}</p>`).join("")}
            <p class="quote">${ending.quote}</p>
            <div class="credit">
              分支剧情与分支结局已启用：不同选项会进入不同场景路线，并在终幕根据路径触发不同结局。
            </div>
          </div>
        </article>
      `;

      choices.innerHTML = "";
      hint.innerHTML = "结局达成。右上角可查看结局与成就，点击右侧按钮可重开。";
      nextButton.disabled = false;
      nextButton.innerHTML = "<strong>重新开始</strong><span>从序章开始</span>";
    }

    async function applyChoiceAndAdvance() {
      if (state.finished || state.typing || state.selectedChoice === null) return;

      const scene = sceneMap[state.currentSceneId];
      const choice = scene.choices[state.selectedChoice];
      state.trust += choice.effects.trust;
      state.calm += choice.effects.calm;
      addAffectionPoints(choice.effects.trust + choice.effects.calm);
      updateMeters();
      updateProgressStats();
      const newlyUnlocked = evaluateAchievements();
      syncProgress(newlyUnlocked, true);

      if (choice.unlock) state.unlocks.add(choice.unlock);

      if (scene.isFinal) {
        const endingId = resolveEnding(choice);
        renderEnding(endingId);
        return;
      }

      state.step += 1;
      await renderScene(choice.next);
    }

    function resetGame() {
      state.currentSceneId = "intro";
      state.step = 0;
      state.trust = 0;
      state.calm = 0;
      state.selectedChoice = null;
      state.unlocks = new Set();
      state.typing = false;
      state.skipSegment = false;
      state.finished = false;
      state.replyNode = null;
      state.sceneLinesWrap = null;
      ++state.typeToken;
      updateMeters();
      renderScene("intro");
    }

    nextButton.addEventListener("click", async () => {
      if (state.finished) {
        resetGame();
        return;
      }
      await applyChoiceAndAdvance();
    });

    archiveToggle.addEventListener("click", () => {
      openArchivePanel();
    });

    archivePanelClose.addEventListener("click", () => {
      closeArchivePanel();
    });

    archiveOverlay.addEventListener("click", (event) => {
      if (event.target === archiveOverlay) closeArchivePanel();
    });

    themeSwitcher.addEventListener("click", (event) => {
      const trigger = event.target.closest(".theme-option");
      if (!trigger || trigger.disabled) return;
      const targetTheme = trigger.dataset.theme || "default";
      if (!isThemeUnlocked(targetTheme)) return;
      progress.selectedTheme = targetTheme;
      syncProgress([], false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "Escape" && !archiveOverlay.hidden) {
        closeArchivePanel();
        return;
      }
      if (event.code !== "Space") return;
      if (!archiveOverlay.hidden) return;
      const activeTag = document.activeElement ? document.activeElement.tagName : "";
      if (activeTag === "INPUT" || activeTag === "TEXTAREA") return;
      if (state.typing) {
        event.preventDefault();
        state.skipSegment = true;
      }
    });

    loadProgress();
    evaluateAchievements();
    syncProgress([], false);
    updateMeters();
    renderScene("intro");
  </script>
</body>
</html>
